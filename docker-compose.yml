services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-discuz35}_nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "${APP_PORT:-18080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - discuz_net

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-discuz35}_php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./:/var/www/html
    networks:
      - discuz_net

  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-discuz35}_mysql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-discuz_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-discuz}
      MYSQL_USER: ${MYSQL_USER:-discuz}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-discuz_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-33060}:3306"
    volumes:
      - discuz_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/discuz.cnf:ro
      - ./docker/mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - discuz_net

volumes:
  discuz_mysql_data:

networks:
  discuz_net:
    driver: bridge
