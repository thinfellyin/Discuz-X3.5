server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html index.htm;

    charset utf-8;
    client_max_body_size 64m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Discuz common SEO rewrite rules. They are harmless when SEO rewrite is not enabled.
    rewrite ^/forum-([0-9]+)-([0-9]+)\.html$ /forum.php?mod=forumdisplay&fid=$1&page=$2 last;
    rewrite ^/thread-([0-9]+)-([0-9]+)-([0-9]+)\.html$ /forum.php?mod=viewthread&tid=$1&extra=page%3D$3&page=$2 last;
    rewrite ^/space-(username|uid)-(.+)\.html$ /home.php?mod=space&$1=$2 last;
    rewrite ^/blog-([0-9]+)-([0-9]+)\.html$ /home.php?mod=space&uid=$1&do=blog&id=$2 last;
    rewrite ^/archiver/(fid|tid)-([0-9]+)\.html$ /archiver/index.php?action=$1&value=$2 last;

    # Block direct access to sensitive runtime/config/database backup files.
    location ~* ^/(config|install/data|uc_server/data|uc_client/data|data)/(.*)\.(php|inc|conf|sql|bak|log|tpl)$ {
        deny all;
    }

    location ~* \.(bak|sql|inc|conf|log|sh|md|env)$ {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot|map|mp3|mp4|swf)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
    }
}
